[platformio]
default_envs = uno

[env:uno]
platform = atmelavr
board = uno
framework = arduino
test_ignore = *

upload_port = COM5
monitor_port = COM5
monitor_speed = 115200

build_src_filter =
  -<*>
  +<main.cpp>
  +<flight_state.cpp>

build_flags =
  -DUSE_DATALOG_REPLAY=0

lib_deps =
  robtillaart/MS5611 @ ^0.5.1
  wollewald/ICM20948_WE @ 1.2.8
  SD
  https://github.com/sparkfun/SparkFun_ICM-20948_ArduinoLibrary.git#v1.3.2

[env:uno_replay]
extends = env:uno

build_flags =
  -DUSE_DATALOG_REPLAY=1

[env:sensor_probe]
extends = env:uno
test_ignore = *

upload_port = COM5
monitor_port = COM5
monitor_speed = 115200

build_src_filter =
  -<*>
  +<test1.cpp>

[env:native_tests]
platform = native
test_build_src = no
build_src_filter =
  -<*>

[env:native_replay]
platform = native
build_src_filter =
  -<*>
  +<main.cpp>
  +<flight_state.cpp>
build_flags =
  -DUSE_DATALOG_REPLAY=1
  -DDESKTOP_REPLAY=1
extra_scripts =
  post:tools/native_replay_target.py
